<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>You're on the list — Liber</title>
<meta name="robots" content="noindex, follow" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;450;500;600&display=swap" onload="this.onload=null;this.rel='stylesheet'" />
<noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;450;500;600&display=swap" /></noscript>
<link rel="icon" href="/favicon.svg" type="image/svg+xml" />
<style>
  :root{
    --paper:#F7F3EC; --ink:#241F1A; --ink-soft:#4A433B; --ink-faint:#8A8074;
    --line:#E2D9C9; --sage:#5E6E58; --sage-deep:#475141; --radius:18px;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--paper);color:var(--ink-soft);font-family:'Inter',system-ui,sans-serif;font-size:18px;line-height:1.65;display:flex;flex-direction:column;min-height:100vh;}
  header{border-bottom:1px solid var(--line);}
  .nav{max-width:820px;margin:0 auto;padding:18px 24px;}
  .logo{font-family:'Fraunces',serif;font-size:1.3rem;color:var(--ink);text-decoration:none;font-weight:600;}
  main{max-width:600px;margin:0 auto;padding:80px 24px;flex:1;}
  h1{font-family:'Fraunces',serif;color:var(--ink);font-size:2rem;line-height:1.25;font-weight:600;margin:0 0 .5em;}
  p{margin:0 0 1.2em;}
  .btn{display:inline-block;background:var(--sage);color:#fff;text-decoration:none;padding:14px 24px;border-radius:999px;font-size:1rem;}
  .btn:hover{background:var(--sage-deep);}
  .mini{font-size:.9rem;color:var(--ink-faint);margin-top:1.5em;}
  a{color:var(--sage-deep);}
</style>
</head>
<body>

<header><div class="nav"><a class="logo" href="/">Liber</a></div></header>

<main>
  <h1>You're on the list.</h1>
  <p>We'll send you a note when a new guide goes up — registration, evidence, reviews, the things that are hard to find a straight answer on. Nothing else.</p>
  <p><a class="btn" href="/guides/">Back to the guides</a></p>
  <p class="mini">Changed your mind? Reply to any email, or write to <a href="mailto:adam@liber.net.au">adam@liber.net.au</a> and you're off the list.</p>
</main>

</body>
</html>
